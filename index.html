<style>

@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}

/* ════════════════════════════════════════════
   📐 계산식 안내 FAB
════════════════════════════════════════════ */
.fml-fab{
  position:fixed;bottom:82px;right:18px;z-index:1200;
  background:linear-gradient(135deg,#0f172a,#1e3a5f,#1d4ed8);
  color:white;border:none;border-radius:16px;
  padding:11px 15px;cursor:pointer;
  box-shadow:0 4px 20px rgba(30,58,95,0.60);
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-family:'Noto Sans KR',sans-serif;line-height:1.3;
  transition:transform .15s,box-shadow .15s;
}
.fml-fab:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(30,58,95,0.80);}
.fml-fab:active{transform:translateY(0);}

/* ════════════════════════════════════════════
   📲 PWA 설치 FAB
════════════════════════════════════════════ */
.pwa-install-fab{
  position:fixed;bottom:18px;right:18px;z-index:1200;
  background:linear-gradient(135deg,#be185d 0%,#831843 100%);
  color:white;border:none;border-radius:16px;
  padding:11px 15px;cursor:pointer;
  box-shadow:0 4px 20px rgba(190,24,93,0.60);
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-family:'Noto Sans KR',sans-serif;line-height:1.3;
  transition:transform .15s,box-shadow .15s;
  animation:pwaFabIn 0.55s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes pwaFabIn{
  from{opacity:0;transform:scale(0.3) rotate(-25deg);}
  to{opacity:1;transform:scale(1) rotate(0deg);}
}
.pwa-install-fab:hover{transform:translateY(-3px) scale(1.06);box-shadow:0 8px 28px rgba(190,24,93,0.75);}
.pwa-install-fab:active{transform:translateY(0) scale(0.97);}
.pwa-install-fab-badge{
  position:absolute;top:-7px;right:-7px;
  background:#f59e0b;color:white;font-size:8px;font-weight:900;
  width:19px;height:19px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:2px solid white;
  animation:badgePing 2.2s ease-in-out infinite;
}
@keyframes badgePing{
  0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(245,158,11,0.65);}
  50%{transform:scale(1.2);box-shadow:0 0 0 6px rgba(245,158,11,0);}
}

/* ════════════════════════════════════════════
   모달 오버레이
════════════════════════════════════════════ */
.fml-overlay{
  position:fixed;inset:0;z-index:9000;
  background:rgba(0,0,0,0.62);backdrop-filter:blur(5px);
  display:flex;align-items:center;justify-content:center;padding:16px;
  animation:fmlFadeIn .2s ease-out;
}
@keyframes fmlFadeIn{from{opacity:0;}to{opacity:1;}}

.fml-box{
  background:#fff;border-radius:20px;
  width:100%;max-width:820px;
  max-height:calc(100vh - 32px);
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 30px 80px rgba(0,0,0,0.38);
  animation:fmlSlideUp .26s cubic-bezier(0.34,1.5,0.64,1);
}
@keyframes fmlSlideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}

/* 헤더 */
.fml-hd{
  background:linear-gradient(135deg,#0f172a,#1e3a5f,#1d4ed8);
  color:white;padding:18px 22px 0;flex-shrink:0;
}
.fml-hd-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
.fml-close{
  background:rgba(255,255,255,0.13);border:none;color:white;
  border-radius:50%;width:34px;height:34px;flex-shrink:0;
  cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.fml-close:hover{background:rgba(255,255,255,0.28);}

/* 내부 탭바 */
.fml-tabs{
  display:flex;overflow-x:auto;gap:0;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.fml-tabs::-webkit-scrollbar{display:none;}
.fml-tab{
  padding:9px 18px;border:none;background:transparent;
  color:rgba(255,255,255,0.6);font-size:12px;font-weight:700;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap;
  border-bottom:3px solid transparent;transition:all .15s;flex-shrink:0;
}
.fml-tab.on{color:#fff;border-bottom-color:#93c5fd;}
.fml-tab:hover:not(.on){color:rgba(255,255,255,0.88);}

/* 바디 */
.fml-bd{
  overflow-y:auto;padding:20px 22px 28px;flex:1;
  -webkit-overflow-scrolling:touch;
}
.fml-bd::-webkit-scrollbar{width:5px;}
.fml-bd::-webkit-scrollbar-thumb{background:#93c5fd;border-radius:3px;}
.fml-bd::-webkit-scrollbar-track{background:transparent;}

/* 섹션 */
.fml-sec{margin-bottom:20px;}
.fml-sec-ttl{
  font-size:11px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;
  margin-bottom:10px;display:flex;align-items:center;gap:7px;
  border-left:3px solid currentColor;padding-left:9px;
}
/* 카드 */
.fml-card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.fml-card-ttl{font-size:12px;font-weight:700;color:#1e293b;margin-bottom:6px;}
.fml-eq{
  display:block;font-family:'Noto Sans Mono',monospace;
  font-size:12.5px;font-weight:700;color:#0e7490;
  background:#ecfeff;border-radius:6px;
  padding:7px 11px;margin:6px 0;

.fml-eq.hi{background:#fefce8;color:#92400e;}
.fml-eq.red{background:#fff1f2;color:#b91c1c;}
.fml-eq.grn{background:#f0fdf4;color:#15803d;}
.fml-note{font-size:10px;color:#6b7280;margin-top:5px;line-height:1.8;}
/* 2열 그리드 */
.fml-g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.fml-hi{border:1.5px solid #a5f3fc;background:#ecfeff;border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.fml-hi.red{border-color:#fecaca;background:#fff1f2;}
.fml-hi.grn{border-color:#bbf7d0;background:#f0fdf4;}

/* ── 반응형 ── */
/* 모바일: 바텀시트 */
@media(max-width:640px){
  .fml-overlay{padding:0;align-items:flex-end;}

    border-radius:20px 20px 0 0;max-height:92vh;

  @keyframes fmlMobile{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .fml-hd{padding:14px 16px 0;}
  .fml-bd{padding:16px 16px 36px;}
  .fml-g2{grid-template-columns:1fr;}
  .fml-tab{padding:9px 13px;font-size:11px;}
  .fml-fab{bottom:74px;right:14px;padding:10px 13px;}
}
/* 태블릿 */
@media(min-width:641px) and (max-width:1024px){
  .fml-box{max-width:88vw;max-height:88vh;}
}
/* 데스크톱 */
@media(min-width:1025px){
  .fml-box{max-width:840px;}
}

/* ═══ A4 계산서 반응형 미리보기 ═══
   【transform-origin:top left + 수동 offset 정중앙 방식】
   ① scale  = (outerW - 16) / 794      (최대 1.0)
   ② scaledW= 794 × scale
   ③ offset = (outerW - scaledW) / 2   ← 픽셀 정중앙
   ④ outer.height = scrollHeight×scale+40  (높이 보정)
   → 데스크탑·태블릿·모바일 전 해상도 정중앙 유지
   → 인쇄: @media print transform:none 원본 A4 복원      */
.rpt-outer{
  width:100%;
  max-width:100%;
  box-sizing:border-box;
  overflow:hidden;
  background:#cffafe;
  padding:20px 0;
  border-radius:14px;
  margin-bottom:16px;
  position:relative;
}
.rpt-inner{
  width:794px;
  box-sizing:border-box;
  position:relative;
  /* JS: transform-origin:top left; transform:translateX(offsetPx)scale(s) */
}
.rpt-hint{
  display:none;
  align-items:center;gap:6px;
  background:#ecfeff;border:1px solid #67e8f9;border-radius:8px;
  padding:8px 13px;font-size:10px;font-weight:600;color:#0e7490;
  margin-bottom:10px;
}
@media(max-width:860px){.rpt-hint{display:flex;}}
@media print{
  .rpt-outer{background:white!important;padding:0!important;overflow:visible!important;
    border-radius:0!important;margin:0!important;height:auto!important;}
  .rpt-inner{transform:none!important;transform-origin:unset!important;width:794px!important;box-sizing:border-box!important;}
  .rpt-hint{display:none!important;}
}

/* ═══ 배관 구간 테이블 모바일 스크롤 힌트 ═══ */
.seg-hint{
  display:none;
  align-items:center;gap:6px;justify-content:center;
  font-size:11px;font-weight:700;color:#6b7280;
  padding:6px 0;
  background:#f8fafc;border:1px solid #e2e8f0;
  border-bottom:none;border-radius:6px 6px 0 0;
}
@media(max-width:860px){.seg-hint{display:flex;}}

/* ═══ Box 컴포넌트 CSS 클래스 ═══ */
.box-hd{color:white;padding:10px 18px;font-size:13px;font-weight:700;letter-spacing:0.04em;}
.box-bd{padding:16px;}
@media(max-width:640px){
  .box-hd{padding:9px 14px!important;font-size:11px!important;}
  .box-bd{padding:14px 12px!important;}
}

/* ═══ 메인 래퍼 모바일 패딩 ═══ */
.main-outer{max-width:1320px;margin:0 auto;padding:0 24px;}
.main-inner{padding-top:20px;padding-bottom:40px;}
@media(max-width:640px){
  .main-outer{padding:0 10px;}
  .main-inner{padding-top:14px;padding-bottom:80px;}
  .hdr-h1{font-size:18px!important;}
  .hdr-pad{padding:0 14px!important;}
  .hdr-right-hide{display:none!important;}
  .g-proj-3{grid-template-columns:1fr!important;}
  .g-res-2col{grid-template-columns:1fr!important;}
  .tab-bar-scroll{overflow-x:auto;white-space:nowrap;scrollbar-width:none;}
  .tab-bar-scroll::-webkit-scrollbar{display:none;}
}
@media(max-width:420px){
  .main-outer{padding:0 8px;}
}
</style>

<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const { useState, useMemo, useEffect } = React;

/* ══════════════════════════════════════════════════════════════
   공통 상수
══════════════════════════════════════════════════════════════ */
/* 옥내소화전 (NFPC/NFTC 102) */
const H_FLOW_PER  = 130;   // 옥내소화전 개당 방사량 (ℓ/min)
const H_NOZZLE    = 17;    // 노즐선단 방수압력 환산수두 0.17 MPa
const H_WATER_T   = 20;    // 방사시간 (min)
const H_MAX_N     = 2;     // 최대 동시사용 (NFTC 102 최대 2개)

/* 옥외소화전 (NFPC 109) */
const O_FLOW_PER  = 350;   // 옥외소화전 개당 방사량 (ℓ/min)
const O_NOZZLE    = 25;    // 노즐선단 방수압력 환산수두 0.25 MPa
const O_WATER_T   = 20;    // 방사시간 (min)
const O_MAX_N     = 2;     // 최대 동시사용 (NFPC 109 최대 2개)
const O_WATER_PER = 7;     // 옥외소화전 1개당 수원 (m³)

const PIPE_CONFIG = {
  SCH10:{label:"배관용 탄소강관 KS D3507 (백관)",       shortLabel:"KS D3507",C:120,
    inner:{25:27.6,32:36.2,40:42.1,50:53.2,65:69.0,80:81.0,100:105.3,125:130.1,150:155.5,200:204.6}},
  SCH40:{label:"압력배관용 탄소강관 KS D3562 (흑관)",   shortLabel:"KS D3562",C:120,
    inner:{25:26.6,32:35.1,40:40.9,50:52.5,65:62.7,80:77.9,100:102.3,125:128.2,150:154.1,200:202.7}},
  STS:  {label:"배관용 스테인리스강관 KS D3595",        shortLabel:"STS",     C:150,
    inner:{25:27.6,32:36.8,40:42.8,50:54.8,65:70.0,80:85.0,100:108.2,125:133.4,150:160.0,200:210.0}},
  CPVC: {label:"내식성 CPVC관 (소방용)",               shortLabel:"CPVC",    C:150,
    inner:{25:26.6,32:35.1,40:40.9,50:52.5,65:62.7,80:79.4,100:101.6,125:127.0,150:154.1,200:203.2}},
};
const FITTING_EQ={
  25:[0.9,0.54,1.5,0.27,0.18,7.5,4.5,2.0],  32:[1.2,0.72,1.8,0.36,0.24,10.5,5.4,2.5],
  40:[1.5,0.90,2.1,0.45,0.30,13.8,6.5,3.1], 50:[2.1,1.20,3.0,0.60,0.39,16.5,8.4,4.0],
  65:[2.4,1.30,3.6,0.75,0.48,19.5,10.2,4.6],80:[3.0,1.80,4.5,0.90,0.60,24.0,12.0,5.7],
  100:[4.2,2.40,6.3,1.20,0.81,37.5,16.5,7.6],125:[5.1,3.00,7.5,1.50,0.99,42.0,21.0,10.0],
  150:[6.0,3.60,9.0,1.80,1.20,49.5,24.0,12.0],200:[6.5,3.70,14.0,4.00,1.40,70.0,33.0,15.0],
};
/* 옥내소화전 호스 */
const H_HOSE_TYPES={
  1:{label:"40mm 아마호스",     rate:26,fixed:null},
  2:{label:"40mm 고무내장호스", rate:12,fixed:null},
  3:{label:"50mm 아마호스",     rate:7, fixed:null},
  4:{label:"50mm 고무내장호스", rate:3, fixed:null},
  5:{label:"25mm 호스릴",       rate:0, fixed:14},
};
/* 옥외소화전 호스 — 65mm 전용 (NFPC 109 제6조②) */
const O_HOSE_TYPES={
  1:{label:"65mm 마(아마)호스",  rate:8, fixed:null},
  2:{label:"65mm 고무내장호스",  rate:4, fixed:null},
};
const TRANS_TYPE={1:{label:"전동기 직결",k:1.1},2:{label:"전동기 이외의 원동기",k:1.15}};
const H_PIPE_SIZES=[40,50,65,80,100,125,150,200];
const O_PIPE_SIZES=[40,50,65,80,100,125,150,200];
const PUMP_SIZES=[40,50,65,80,100,125,150];
const HP_STEPS=[3,5,7.5,10,15,20,25,30,40,50,60,75,100,125,150,200];
const BD="1px solid #d1d5db";

function calcFriction(Q,D,pipeType){
  if(!Q||!D)return 0;
  const cfg=PIPE_CONFIG[pipeType]||PIPE_CONFIG.SCH10;
  const id=(cfg.inner[D]||D)/1000;
  const Qm=Q/1000/60;
  return 10.67*Math.pow(Qm,1.852)/(Math.pow(cfg.C,1.852)*Math.pow(id,4.87));
}
function calcVelocity(Q,D,pipeType){
  if(!Q||!D)return 0;
  const cfg=PIPE_CONFIG[pipeType]||PIPE_CONFIG.SCH10;
  const id=(cfg.inner[D]||D)/1000;
  const Qm=Q/1000/60;
  return Qm/(Math.PI/4*id*id);
}
function nextHP(kw){const hp=kw*1.341;for(const h of HP_STEPS){if(h>=hp)return h;}return Math.ceil(hp/5)*5;}
const f2=v=>isNaN(v)?"-":Number(v).toFixed(2);
const f3=v=>isNaN(v)?"-":Number(v).toFixed(3);
const ff=(v,d=1)=>isNaN(v)?"-":Number(v).toFixed(d);

/* ── 공통 UI 컴포넌트 ── */
function LabelEl({children}){return <div style={{fontSize:11,fontWeight:700,color:"#374151",marginBottom:5,letterSpacing:"0.02em"}}>{children}</div>;}
function Sel({val,onChange,children,style={}}){
  return <select value={val} onChange={e=>onChange(e.target.value)}
    style={{width:"100%",padding:"8px 12px",borderRadius:8,border:BD,background:"white",fontSize:13,outline:"none",...style}}>{children}</select>;
}
function InpNum({val,onChange,unit,min,max}){
  return <div style={{display:"flex",alignItems:"center",gap:6}}>
    <input type="number" value={val} min={min} max={max}
      onChange={e=>onChange(+(e.target.value))}
      style={{width:"100%",padding:"8px 12px",borderRadius:8,border:BD,background:"white",fontSize:13,outline:"none"}}/>
    {unit&&<span style={{fontSize:12,color:"#6b7280",whiteSpace:"nowrap"}}>{unit}</span>}
  </div>;
}
function EffInp({val,onChange}){
  return <div style={{display:"flex",alignItems:"center",gap:6}}>
    <input type="number" value={val} min={10} max={80} step={1}

function Box({title,children,color="#1e3a5f"}){

function Card({label,value,unit,formula,bc}){
  const cols={blue:["#eff6ff","#1d4ed8"],orange:["#fff7ed","#c2410c"],green:["#f0fdf4","#15803d"],red:["#fef2f2","#b91c1c"],teal:["#f0fdfa","#0f766e"]};
  const [bg,tc]=cols[bc]||["#f8fafc","#374151"];
  return <div style={{background:bg,borderRadius:10,padding:"12px 14px",border:`1px solid ${tc}22`}}>
    <div style={{fontSize:10,color:"#6b7280",marginBottom:4}}>{label}</div>
    <div style={{fontSize:20,fontWeight:900,color:tc,fontFamily:"'Noto Sans Mono',monospace",lineHeight:1.1}}>
      {value}<span style={{fontSize:11,color:"#9ca3af",marginLeft:4}}>{unit}</span>
    </div>
    {formula&&<div style={{fontSize:9,color:"#9ca3af",marginTop:4,fontFamily:"'Noto Sans Mono',monospace"}}>{formula}</div>}
  </div>;
}
function PipeTable({segs,setSegs,pipeType,pipeSizes,velLimit,velLimit2,label,velLabel,flowOpts}){
  const HDRS=["NO","유량\n(ℓ/min)","관경\n(A)","직관\n(m)","90°\nElbow","45°\nElbow","분류\nTee","직류\nTee","Gate\nV/V","Ball\nV/V","Angle\nV/V","Check\nV/V","상당직관\n(m)","마찰계수\n(m/100m)","손실수두\n(m)","유속\n(m/s)","×"];
  const upd=(i,k,v)=>setSegs(p=>{const n=[...p];n[i]={...n[i],[k]:v};return n;});
  const add=()=>setSegs(p=>[...p,{flow:flowOpts?flowOpts[0]:130,dia:100,len:10,e90:0,e45:0,teeB:0,teeS:0,gate:0,ball:0,angle:0,check:0}]);
  const del=i=>setSegs(p=>p.filter((_,j)=>j!==i));
  return <Box title={label} color="#334155">
    {/* 모바일 스크롤 안내 (860px 이하에서만 표시) */}
    <div className="seg-hint">
      <span style={{fontSize:14}}>←</span>
      <span>좌우로 스크롤하여 모든 항목 입력</span>
      <span style={{fontSize:14}}>→</span>
    </div>
    <div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
        <colgroup>
          <col style={{width:"3%"}}/><col style={{width:"7%"}}/><col style={{width:"6%"}}/><col style={{width:"6%"}}/>
          <col style={{width:"5%"}}/><col style={{width:"5%"}}/><col style={{width:"5%"}}/><col style={{width:"5%"}}/>
          <col style={{width:"5%"}}/><col style={{width:"5%"}}/><col style={{width:"5%"}}/><col style={{width:"5%"}}/>
          <col style={{width:"7%"}}/><col style={{width:"8%"}}/><col style={{width:"7%"}}/><col style={{width:"6%"}}/><col style={{width:"2%"}}/>
        </colgroup>
        <thead>
          <tr style={{background:"#1e3a5f",color:"white"}}>
            {HDRS.map((h,i)=><th key={i} style={{border:BD,padding:"5px 2px",textAlign:"center",whiteSpace:"pre-line",lineHeight:1.3,fontSize:9,fontWeight:700}}>{h}</th>)}
          </tr>
        </thead>
        <tbody>
          {segs.map((s,i)=>{
            const eq=FITTING_EQ[s.dia]||FITTING_EQ[100];
            const fl=s.e90*eq[0]+s.e45*eq[1]+s.teeB*eq[2]+s.teeS*eq[3]+s.gate*eq[4]+s.ball*eq[5]+s.angle*eq[6]+s.check*eq[7];
            const tl=(s.len||0)+fl;
            const fric=calcFriction(s.flow,s.dia,pipeType);
            const hl=fric*tl/100;
            const vel=calcVelocity(s.flow,s.dia,pipeType);
            const lim=velLimit||4;
            const lim2=velLimit2||10;
            const vW=vel>lim2?"⚠":vel>lim?"⚡":"";
            const num=(k,v)=><input type="number" value={v} onChange={e=>upd(i,k,+(e.target.value))}
              style={{width:"100%",padding:"2px",textAlign:"center",fontSize:10,border:"1px solid #e5e7eb",borderRadius:4,fontFamily:"'Noto Sans Mono',monospace",background:"white"}}/>;
            return <tr key={i} style={{background:i%2?"#f9fafb":"white"}}>
              <td style={{border:BD,padding:"4px 2px",textAlign:"center",fontSize:10,fontWeight:700}}>{i+1}</td>
              <td style={{border:BD,padding:"2px"}}>
                {flowOpts
                  ?<select value={s.flow} onChange={e=>upd(i,"flow",+e.target.value)}
                      style={{width:"100%",padding:"2px",fontSize:10,border:"1px solid #e5e7eb",borderRadius:4,fontFamily:"'Noto Sans Mono',monospace",background:"white",textAlign:"center"}}>
                      {flowOpts.map(f=><option key={f} value={f}>{f}</option>)}
                    </select>
                  :num("flow",s.flow)
                }
              </td>
              <td style={{border:BD,padding:"2px"}}>
                <select value={s.dia} onChange={e=>upd(i,"dia",+e.target.value)}
                  style={{width:"100%",padding:"2px",fontSize:10,border:"none",background:"transparent",fontFamily:"'Noto Sans KR',sans-serif",outline:"none"}}>
                  {pipeSizes.map(d=><option key={d} value={d}>{d}</option>)}
                </select>
              </td>
              <td style={{border:BD,padding:"2px"}}>{num("len",s.len)}</td>
              {["e90","e45","teeB","teeS","gate","ball","angle","check"].map(k=>(
                <td key={k} style={{border:BD,padding:"2px"}}>{num(k,s[k])}</td>
              ))}
              <td style={{border:BD,padding:"4px 2px",textAlign:"center",fontSize:10,fontFamily:"'Noto Sans Mono',monospace"}}>{f3(fl)}</td>
              <td style={{border:BD,padding:"4px 2px",textAlign:"center",fontSize:10,fontFamily:"'Noto Sans Mono',monospace",color:"#c2410c",fontWeight:700}}>{f3(fric)}</td>
              <td style={{border:BD,padding:"4px 2px",textAlign:"center",fontSize:10,fontFamily:"'Noto Sans Mono',monospace",color:"#1d4ed8",fontWeight:700}}>{f3(hl)}</td>
              <td style={{border:BD,padding:"4px 2px",textAlign:"center",fontSize:10,fontFamily:"'Noto Sans Mono',monospace",color:vW?"#dc2626":"#374151",fontWeight:vW?700:400}}>{f2(vel)}{vW?" "+vW:""}</td>
              <td style={{border:BD,padding:"2px",textAlign:"center"}}><button onClick={()=>del(i)} style={{background:"#fee2e2",border:"none",borderRadius:4,cursor:"pointer",color:"#dc2626",fontSize:11,fontWeight:700,padding:"2px 6px"}}>×</button></td>
            </tr>;
          })}
          <tr style={{background:"#f1f5f9"}}>
            <td colSpan={14} style={{border:BD,padding:"5px 10px",fontWeight:700,fontSize:11,color:"#374151"}}>배관 마찰손실 합계 (F)</td>
            <td style={{border:BD,padding:"5px",textAlign:"center",fontFamily:"'Noto Sans Mono',monospace",color:"#1d4ed8",fontWeight:900,fontSize:13}}>
              {f3(segs.reduce((s2,s)=>{const eq=FITTING_EQ[s.dia]||FITTING_EQ[100];const fl=s.e90*eq[0]+s.e45*eq[1]+s.teeB*eq[2]+s.teeS*eq[3]+s.gate*eq[4]+s.ball*eq[5]+s.angle*eq[6]+s.check*eq[7];const tl=(s.len||0)+fl;return s2+calcFriction(s.flow,s.dia,pipeType)*tl/100;},0))}
            </td>
            <td colSpan={2} style={{border:BD}}></td>
          </tr>
        </tbody>
      </table>
    </div>
    <div style={{marginTop:8,textAlign:"right"}}>
      <button onClick={add} style={{padding:"6px 14px",background:"#334155",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:12}}>+ 구간 추가</button>
    </div>
    <div style={{marginTop:8,padding:"7px 12px",background:"#fef2f2",border:"1.5px solid #fca5a5",borderRadius:8,fontSize:11,color:"#991b1b",fontFamily:"'Noto Sans KR',sans-serif",fontWeight:600}}>
      {velLabel||`⚠️ 유속 제한: ≤ ${velLimit||4} m/s — 초과 시 ⚡ 표시`}
    </div>
    <div style={{marginTop:8,padding:"10px 14px",background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8}}>
      <div style={{fontSize:11,fontWeight:700,color:"#374151",marginBottom:6}}>【 관부속 상당직관 적용 참고사항 】</div>
      <ol style={{margin:0,paddingLeft:18,fontSize:10,color:"#6b7280",lineHeight:2}}>
        <li>Elbow, Tee는 <b>나사접합</b>을 기준으로 한 것임.&nbsp;&nbsp;(용접의 경우 손실을 더 적게 적용)</li>
        <li>Reducer는 <b>45°Elbow</b>와 같다.&nbsp;&nbsp;(다만, 관경이 작은 쪽에 따른다.)</li>
        <li>Coupling은 <b>직류 Tee</b>와 같다.</li>
        <li>Union, Flange, Socket은 손실수두가 미소하여 <b>생략</b>한다.</li>
        <li>Auto Valve(포소화전 설비), Glove Valve는 <b>Ball Valve</b>와 같다.</li>
        <li>Alarm Valve, Foot Valve 및 Strainer는 <b>Angle Valve</b>와 같다.</li>
      </ol>
    </div>
  </Box>;
}

  useEffect(()=>{const h=(e)=>{e.preventDefault();setInstallPrompt(e);if(!window.matchMedia('(display-mode:standalone)').matches)setShowInstallBanner(true);};window.addEventListener('beforeinstallprompt',h);return()=>window.removeEventListener('beforeinstallprompt',h);},[]);
  const handleInstall=async()=>{if(!installPrompt)return;installPrompt.prompt();const r=await installPrompt.userChoice;if(r.outcome==='accepted')console.log('[PWA] 설치 완료');setInstallPrompt(null);setShowInstallBanner(false);};
  const deferredPrompt=installPrompt; /* PWA 설치 FAB에서 참조 */

  /* ═══ A4 계산서 반응형 스케일링 ═══
     【transform-origin:top left + 수동 offset 정중앙 방식】
     ① scale  = (outerW - 16) / 794      (최대 1.0)
     ② scaledW= 794 × scale
     ③ offset = (outerW - scaledW) / 2   ← 픽셀 정중앙
     ④ inner  = translateX(offset) scale(s)
     ⑤ outer.height = scrollHeight×scale+40  (높이 보정)
     → 인쇄: @media print transform:none 원본 A4 복원     */
  useEffect(()=>{
    if(tab!==3)return;
    function scaleRpt(){
      const outer=document.getElementById('rpt-outer');
      const inner=document.getElementById('rpt-inner');
      if(!outer||!inner)return;
      const A4W=794;
      const outerW=outer.clientWidth;
      const scale=Math.min(1,(outerW-16)/A4W);
      const scaledW=A4W*scale;
      const offset=Math.max(0,(outerW-scaledW)/2);
      if(scale>=1){
        inner.style.cssText=
          'width:794px;box-sizing:border-box;'+
          'transform-origin:top left;'+
          `transform:translateX(${offset}px) scale(1);`;
        outer.style.height='auto';
      }else{
        inner.style.cssText=
          'width:794px;box-sizing:border-box;'+
          'transform-origin:top left;'+
          `transform:translateX(${offset}px) scale(${scale});`;
        outer.style.height=(inner.scrollHeight*scale+40)+'px';
      }
    }
    const t=setTimeout(scaleRpt,60);
    window.addEventListener('resize',scaleRpt);
    return()=>{clearTimeout(t);window.removeEventListener('resize',scaleRpt);};
  },[tab,hSegs,oSegs,hSys,oSys,cPump,proj]);

  /* ── 옥내소화전 계산 ── */
  const H=useMemo(()=>{
    const A=Math.min(H_MAX_N,Math.max(1,hSys.hydrants|0));
    const Clpm=A*H_FLOW_PER;
    const D=Clpm*H_WATER_T/1000;
    let F=0;
    hSegs.forEach(s=>{
      const eq=FITTING_EQ[s.dia]||FITTING_EQ[100];
      const fl=s.e90*eq[0]+s.e45*eq[1]+s.teeB*eq[2]+s.teeS*eq[3]+s.gate*eq[4]+s.ball*eq[5]+s.angle*eq[6]+s.check*eq[7];
      const tl=(s.len||0)+fl;
      F+=calcFriction(s.flow,s.dia,hSys.pipeType)*tl/100;
    });
    const hose=H_HOSE_TYPES[hSys.hoseType]||H_HOSE_TYPES[2];
    const G=hose.fixed!=null?hose.fixed:hose.rate*hSys.hoseLen/100;
    const E=+hSys.actualHead;
    const sub=E+F+G+H_NOZZLE;
    const I=sub*0.1;
    const J=Math.ceil(sub+I);
    return {A,Clpm,D,E,F,G,I,J,hose};
  },[hSys,hSegs]);

  /* ── 옥외소화전 계산 ── */
  const O=useMemo(()=>{
    const A=Math.min(O_MAX_N,Math.max(1,oSys.hydrants|0));
    const Clpm=A*O_FLOW_PER;
    const D=A*O_WATER_PER;
    let F=0;
    oSegs.forEach(s=>{
      const eq=FITTING_EQ[s.dia]||FITTING_EQ[100];
      const fl=s.e90*eq[0]+s.e45*eq[1]+s.teeB*eq[2]+s.teeS*eq[3]+s.gate*eq[4]+s.ball*eq[5]+s.angle*eq[6]+s.check*eq[7];
      const tl=(s.len||0)+fl;
      F+=calcFriction(s.flow,s.dia,oSys.pipeType)*tl/100;
    });
    const hose=O_HOSE_TYPES[oSys.hoseType]||O_HOSE_TYPES[2];
    const G=hose.rate*oSys.hoseLen/100;
    const E=+oSys.actualHead;
    const sub=E+F+G+O_NOZZLE;
    const I=sub*0.1;
    const J=Math.ceil(sub+I);
    return {A,Clpm,D,E,F,G,I,J,hose};
  },[oSys,oSegs]);

  /* ── 겸용 펌프 계산 ── */
  const CP=useMemo(()=>{
    const Clpm=H.Clpm+O.Clpm;      // 유량 합산
    const J=Math.max(H.J,O.J);     // 전양정: 더 높은 쪽 (MAX)
    const D=H.D+O.D;               // 수원 합산
    const M=Clpm/1000;
    const N=cPump.pumpEff/100;
    const K=(TRANS_TYPE[cPump.transType]&&TRANS_TYPE[cPump.transType].k)||1.1;
    const Pkw=0.163*M*J*K/N;
    const Php=nextHP(Pkw);
    const hHead=H.J>=O.J?"옥내소화전":"옥외소화전";
    return {Clpm,J,D,M,N,K,Pkw,Php,hHead};
  },[H,O,cPump]);

  const TABS=["① 옥내소화전 입력","② 옥외소화전 입력","③ 겸용펌프 결과","④ 계산서 출력"];
  const TAB_COLORS=["#b91c1c","#15803d","#1d4ed8","#334155"];

  const SEC={background:"white",borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,0.08)",marginBottom:16,overflow:"hidden"};
  const STITLE=(c)=>({background:c,color:"white",padding:"8px 16px",fontSize:12,fontWeight:700,letterSpacing:"0.04em"});

  return <>
  <div style={{minHeight:"100vh",background:"#f1f5f9",fontFamily:"'Noto Sans KR',sans-serif"}}>

    {/* ── 헤더 ── */}
    <div className="no-print" style={{background:"linear-gradient(135deg,#0f172a,#1e3a5f,#1d4ed8)",color:"white",padding:"20px 0 0"}}>

          <div>

              Combined Fire Pump System

            <h1 className="hdr-h1" style={{fontSize:26,fontWeight:900,letterSpacing:"0.04em",lineHeight:1.2}}>
              겸용 펌프 용량 계산서
            </h1>
            <div style={{fontSize:12,marginTop:8,opacity:0.85,letterSpacing:"0.02em"}}>
              옥내소화전(NFPC/NFTC 102) + 옥외소화전(NFPC 109) 겸용 &nbsp;
              <span style={{fontFamily:"'Orbitron',sans-serif",fontWeight:900,fontSize:12,color:"#93c5fd",letterSpacing:"0.08em",textShadow:"0 0 8px rgba(147,197,253,0.6)"}}>
                MANMIN · Ver-3.3
              </span>
            </div>
          </div>
          <div className="hdr-right-hide" style={{textAlign:"right",fontSize:11,opacity:0.8}}>
            <div style={{fontWeight:700,fontSize:13}}>NFTC 102 + NFPC 109</div>
            <div>옥내소화전 + 옥외소화전 겸용</div>
          </div>
        </div>
        <div className="tab-bar-scroll" style={{display:"flex",gap:4,paddingTop:4}}>
          {TABS.map((t,i)=>(
            <button key={i} onClick={()=>setTab(i)}
              style={{padding:"11px 24px",border:"none",cursor:"pointer",fontSize:13,fontWeight:700,
                fontFamily:"'Noto Sans KR',sans-serif",letterSpacing:"0.02em",
                background:tab===i?TAB_COLORS[i]:"transparent",
                color:tab===i?"white":"rgba(255,255,255,0.75)",
                borderBottom:tab===i?`3px solid ${TAB_COLORS[i]}`:"3px solid transparent",
                transition:"all 0.15s"}}>
              {t}
            </button>
          ))}
        </div>
      </div>
    </div>

    {/* ── 요약 바 ── */}
    <div className="no-print" style={{background:"#0f172a",padding:"10px 0"}}>
      <div style={{maxWidth:1320,margin:"0 auto",padding:"0 24px",display:"flex",flexWrap:"wrap",gap:20}}>
        {[
          ["옥내소화전 유량",`${H.Clpm} ℓ/min`],
          ["옥외소화전 유량",`${O.Clpm} ℓ/min`],
          ["겸용 합산 유량",`${CP.Clpm} ℓ/min`],
          ["옥내소화전 전양정",`${H.J} m`],
          ["옥외소화전 전양정",`${O.J} m`],
          ["겸용 채택 전양정",`${CP.J} m (${CP.hHead})`],
          ["겸용 선정 출력",`${CP.Php} HP`],
        ].map(([l,v])=>(
          <span key={l} style={{fontSize:12,color:"#94a3b8"}}>
            {l}: <b style={{color:"#93c5fd",fontFamily:"'Noto Sans Mono',monospace"}}>{v}</b>

    <div className="main-outer">
      <div className="main-inner">

        {/* ════ TAB 0: 옥내소화전 입력 ════ */}
        {tab===0&&<div className="no-print"><>
          <Box title="▣ 프로젝트 정보" color="#7f1d1d">
            <div className="g-proj-3" style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:14}}>
              <div><LabelEl>공사명</LabelEl><input value={proj.name} onChange={e=>setProj(p=>({...p,name:e.target.value}))} style={{width:"100%",padding:"8px 12px",borderRadius:8,border:BD,fontSize:13,outline:"none"}}/></div>
              <div><LabelEl>설계자</LabelEl><input value={proj.designer} onChange={e=>setProj(p=>({...p,designer:e.target.value}))} style={{width:"100%",padding:"8px 12px",borderRadius:8,border:BD,fontSize:13,outline:"none"}}/></div>
              <div><LabelEl>작성일</LabelEl><input type="date" value={proj.date} onChange={e=>setProj(p=>({...p,date:e.target.value}))} style={{width:"100%",padding:"8px 12px",borderRadius:8,border:BD,fontSize:13,outline:"none"}}/></div>
            </div>

          <Box title="Ⅰ. 옥내소화전 시스템 파라미터 (NFTC 102)" color="#b91c1c">

              <div><LabelEl>G-1. 호스 타입 (65mm)</LabelEl>

          <div style={{textAlign:"right",fontFamily:"'Orbitron',sans-serif",fontSize:10,fontWeight:700,color:"#94a3b8",letterSpacing:"0.08em",paddingRight:4}}>MANMIN · Ver-3.3</div>
        </></div>}

        {/* ════ TAB 2: 겸용 펌프 결과 ════ */}
        {tab===2&&<div className="no-print"><>

            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:14}}>
              <div>

                <Sel val={cPump.pumpDia} onChange={v=>ssCp("pumpDia",parseInt(v))}>

            <div style={{background:"white",borderRadius:12,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.08)"}}>
              <div style={{background:"#15803d",color:"white",padding:"10px 16px",fontWeight:700,fontSize:13}}>옥외소화전 단독 계산 결과</div>
              <div style={{padding:14,display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>

            <div id="dev-stamp" style={{fontFamily:"'Orbitron',sans-serif",fontWeight:700,letterSpacing:"0.08em"}}>MANMIN · Ver-3.3</div>
          </div>{/* /report-zone */}
          </div>{/* /rpt-inner */}
          </div>{/* /rpt-outer */}
        </>}

      </div>
    </div>
  </div>

  {/* ═══ PWA 설치 FAB ═══ */}
  {deferredPrompt&&(
    <button className="pwa-install-fab no-print" onClick={handleInstall} aria-label="앱 설치 바로가기">
      <div className="pwa-install-fab-badge">NEW</div>
      <span style={{fontSize:20,lineHeight:1}}>📲</span>
      <span style={{fontSize:10,fontWeight:800,letterSpacing:"0.04em"}}>앱 설치</span>
      <span style={{fontSize:9,opacity:0.8}}>바로가기</span>
    </button>
  )}

  {showInstallBanner&&<div style={{position:"fixed",bottom:16,left:16,right:16,zIndex:9999}} className="pwa-install-banner"><div style={{borderRadius:16,padding:16,display:"flex",alignItems:"center",gap:12}}><img src="icons/icon-192.png" style={{width:48,height:48,borderRadius:12,flexShrink:0,boxShadow:"0 4px 12px rgba(0,0,0,0.3)"}} alt="겸용펌프 앱 아이콘"/><div style={{flex:1,minWidth:0}}><div style={{color:"white",fontSize:13,fontWeight:800}}>홈 화면에 설치하시겠습니까?</div><div style={{color:"#a5f3fc",fontSize:10,fontWeight:600,marginTop:4}}>오프라인에서도 사용 가능합니다</div></div><div style={{display:"flex",gap:8,flexShrink:0}}><button onClick={()=>setShowInstallBanner(false)} style={{color:"rgba(255,255,255,0.6)",fontSize:11,fontWeight:700,padding:"8px 12px",border:"none",background:"transparent",cursor:"pointer",borderRadius:8}}>닫기</button><button onClick={handleInstall} style={{background:"white",color:"#0e7490",fontSize:11,fontWeight:900,padding:"8px 16px",border:"none",borderRadius:8,cursor:"pointer",boxShadow:"0 2px 8px rgba(0,0,0,0.2)"}}>설치</button></div></div></div>}

  {/* ═══ 계산식 안내 FAB ═══ */}
  <button className="fml-fab no-print" style={{bottom:102}} onClick={()=>setShowFormula(true)} aria-label="계산식 안내 열기">
    <span style={{fontSize:20,lineHeight:1}}>📐</span>
    <span style={{fontSize:10,fontWeight:800,letterSpacing:"0.04em"}}>계산식</span>
    <span style={{fontSize:9,opacity:0.75}}>안내</span>
  </button>

  {/* ═══ 계산식 안내 모달 ═══ */}
  {showFormula&&<FormulaModal onClose={()=>setShowFormula(false)}/>}

  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<!-- ═══ Service Worker Ver 3.3 ═══ -->
<script>
(function(){
  if(!('serviceWorker' in navigator)) return;
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js', {updateViaCache:'none'})
      .then(reg => {
        console.log('[PWA] SW 등록 — scope:', reg.scope);
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          nw.addEventListener('statechange', () => {
            if(nw.state === 'installed' && navigator.serviceWorker.controller)
              _showUpdateBanner();
          });
        });
        setInterval(() => reg.update(), 60 * 60 * 1000);
      })
      .catch(e => console.warn('[PWA] SW 등록 실패:', e));
    let _ref = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if(!_ref){ _ref = true; location.reload(); }
    });
  });
  function _showUpdateBanner() {
    if(document.getElementById('sw-update-banner')) return;
    const b = document.createElement('div');
    b.id = 'sw-update-banner';
    b.style.cssText = [
      'position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:99999',
      'background:#164e63;color:white;border-radius:14px;padding:12px 18px',
      'display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,0.4)',
      'font-family:"Noto Sans KR",sans-serif;font-size:13px;white-space:nowrap',
      'animation:slideUp .35s ease-out',
    ].join(';');
    b.innerHTML =
      '<span>🔄 새 버전이 있습니다</span>' +
      '<button onclick="(function(){' +
        'document.getElementById(\'sw-update-banner\').remove();' +
        'navigator.serviceWorker.ready.then(r=>{r.waiting&&r.waiting.postMessage({type:\'SKIP_WAITING\'})});' +
      '})()" style="background:#0e7490;color:white;border:none;border-radius:8px;' +
        'padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;">업데이트</button>' +
      '<button onclick="document.getElementById(\'sw-update-banner\').remove()" ' +
        'style="background:rgba(255,255,255,0.15);color:white;border:none;border-radius:8px;' +
        'padding:6px 10px;font-size:11px;cursor:pointer;">나중에</button>';
    document.body.appendChild(b);
  }
})();
</script>
</body>
</html>
